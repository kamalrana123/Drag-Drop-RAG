name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Frontend CI (React / Vite)
  # ─────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api/v1

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Backend CI (FastAPI + uv)
  # ─────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend — Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      # Optional: enable when needed
      # qdrant:
      #   image: qdrant/qdrant
      #   ports:
      #     - 6333:6333

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install uv
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.6"
          enable-cache: true
          cache-dependency-glob: "backend/requirements.txt"

      # Install Python (managed by uv)
      - name: Install Python
        run: uv python install 3.11

      # Create virtual environment
      - name: Create venv
        run: uv venv

      # Install dependencies
      - name: Install dependencies
        run: uv pip install -r requirements.txt

      # Run tests
      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          APP_SECRET_KEY: test-app-secret
          ENCRYPTION_KEY: ""
          STORAGE_BACKEND: local
          UPLOAD_DIR: ./test_uploads
          QDRANT_URL: http://localhost:6333
          CHROMA_PERSIST_DIR: ./test_chroma
        run: uv run pytest tests/ -v --tb=short -x

  # ─────────────────────────────────────────────────────────────
  # Docker Build Check (PR only)
  # ─────────────────────────────────────────────────────────────
  docker-build-check:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build ./frontend -f frontend/Dockerfile -t rag-frontend:pr-check

      - name: Build backend image
        run: docker build ./backend -f backend/Dockerfile -t rag-backend:pr-check